<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>Konta — Tus finanzas personales</title>
  <link rel="stylesheet" href="css/styles.css" />

  <!-- PWA: hace que la app se pueda "instalar" en el celular -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#14140f" />

  <!-- iOS: para que "Agregar a pantalla de inicio" se vea como una app real -->
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Konta" />
</head>
<body>
  <div id="app"></div>

  <script src="vendor/sql-wasm.js"></script>
  <script type="module" src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
